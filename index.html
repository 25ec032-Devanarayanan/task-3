<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Temperature Converter</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,#2563eb,#9333ea);

}



.container{

    background:white;
    width:350px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px black;

}



h1{

    margin-bottom:25px;

}



input,select,button{

    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;

}



button{

    background:#2563eb;
    color:white;
    cursor:pointer;
    border:none;

}



button:hover{

    background:#1d4ed8;

}



#result{

    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#2563eb;

}



</style>


</head>


<body>


<div class="container">


<h1>
Temperature Converter
</h1>



<input 
type="number" 
id="temperature"
placeholder="Enter Temperature">



<select id="unit">


<option value="C">
Celsius (°C)
</option>


<option value="F">
Fahrenheit (°F)
</option>


<option value="K">
Kelvin (K)
</option>


</select>



<button onclick="convertTemp()">
Convert
</button>



<div id="result">

Result will appear here

</div>



</div>




<script>


function convertTemp(){


let temp=document.getElementById("temperature").value;

let unit=document.getElementById("unit").value;


let result=document.getElementById("result");



if(temp===""){

    result.innerHTML="Please enter a temperature";

    return;

}



temp=Number(temp);



if(isNaN(temp)){

    result.innerHTML="Enter a valid number";

    return;

}




let output="";



// Celsius conversion

if(unit==="C"){


let fahrenheit=(temp*9/5)+32;

let kelvin=temp+273.15;


output=
`${temp}°C = ${fahrenheit.toFixed(2)}°F 
<br>
${kelvin.toFixed(2)}K`;

}




// Fahrenheit conversion

else if(unit==="F"){


let celsius=(temp-32)*5/9;

let kelvin=celsius+273.15;


output=
`${temp}°F = ${celsius.toFixed(2)}°C
<br>
${kelvin.toFixed(2)}K`;

}





// Kelvin conversion

else{


let celsius=temp-273.15;

let fahrenheit=(celsius*9/5)+32;


output=
`${temp}K = ${celsius.toFixed(2)}°C
<br>
${fahrenheit.toFixed(2)}°F`;

}



result.innerHTML=output;



}


</script>



</body>

</html>
